---
layout: default 
title: Blog | Spike Vinz Cruz
---

{% include navbar.html %}

<main class="posts">
  <section class="posts-hero">
    <p class="posts-kicker">Blog</p>
    <h1 class="header">Notes on Rails, product work, and building.</h1>
  </section>

  <section class="posts-list-section">
    <ul>
      {% for post in site.posts %}
      <li>
        <p>{{ post.date | date_to_string }}</p>
        <a href="{{ post.url }}">{{ post.title }}</a>
      </li>
      {% endfor %}
    </ul>
  </section>
</main>
