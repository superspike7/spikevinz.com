---
layout: default
---

{% include navbar.html %}

<main class="post-page">
  <a class="blog-link" href="{{ '/blog' | relative_url }}">&larr; Back to Posts</a>

  <article class="post">
    <header class="post-hero">
      <h1>{{ page.title }}</h1>
      <p class="date">{{ page.date | date_to_string }}</p>
    </header>

    <div class="post-content">
      {{ content }}
    </div>
  </article>
</main>
